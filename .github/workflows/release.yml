name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Create the GitHub Release ONCE, before any builds ────────────────────────
  # Build jobs only upload assets. Creating the release in every build job
  # caused a 5-way race ("Too many retries" / auth flakes) on most releases.
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            || echo "release already exists — continuing"

  # ── Build native binaries for all platforms ──────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/anveesa.exe dist/anveesa.exe
            cd dist && tar czf ../anveesa-${VERSION}-${{ matrix.target }}.tar.gz anveesa.exe
          else
            cp target/${{ matrix.target }}/release/anveesa dist/anveesa
            chmod +x dist/anveesa
            cd dist && tar czf ../anveesa-${VERSION}-${{ matrix.target }}.tar.gz anveesa
          fi

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        # GitHub's upload endpoint intermittently returns 401/5xx — retry
        # with backoff instead of failing the whole release.
        run: |
          for attempt in 1 2 3 4 5; do
            if gh release upload "$GITHUB_REF_NAME" anveesa-*.tar.gz --clobber; then
              exit 0
            fi
            echo "upload attempt $attempt failed — retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "all upload attempts failed"
          exit 1

  # ── Publish to npm (after all binaries are uploaded) ─────────────────────────
  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd npm
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cp ../README.md README.md

      - name: Publish
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish to crates.io (skipped gracefully when no token is configured) ────
  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set — skipping crates.io publish."
            exit 0
          fi
          cargo publish --no-verify
